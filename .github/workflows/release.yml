# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. v1.4.0)"
        required: true
      prerelease:
        description: "Mark as prerelease?"
        required: false
        type: boolean
        default: false
      notes:
        description: "Release notes / description"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # uv will select Python based on pyproject.toml
      - name: Setup uv
        uses: astral-sh/setup-uv@v7.2.0

      - name: Install Rust
        uses: MatteoH2O1999/setup-rust@v2.1.1

      - name: Lint with ruff
        run: uvx ruff check src/omni_script/

      - name: Test with pytest
        run: uv run pytest

      - name: Build
        run: uv run build.py

      # ---- Release-only steps (run once) ----
      - name: Ensure tag does not already exist
        if: matrix.os == 'ubuntu-latest'
        run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Ensure working tree is clean
        if: matrix.os == 'ubuntu-latest'
        run: |
          if ! git diff --quiet; then
            echo "Working tree is dirty after build"
            git status
            exit 1
            fi
      - name: Copy build artifact
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/omni.exe omni-windows.exe
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            cp dist/omni omni-linux
          else
            cp dist/omni omni-macos
          fi

      - name: Upload artifact
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./omni-${{ runner.os }}${{ runner.os == 'Windows' && '.exe' || '' }}
          asset_name: omni-${{ runner.os }}${{ runner.os == 'Windows' && '.exe' || '' }}
          asset_content_type: application/octet-stream

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create tag
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"
      - name: Download matrix artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: ${{ inputs.notes }}
          prerelease: ${{ inputs.prerelease }}
          files: release-artifacts/**/*
